<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="ARES Spartan helmet logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#1b0505"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5a4f"/>
      <stop offset="0.55" stop-color="#ff2d2d"/>
      <stop offset="1" stop-color="#8f0000"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe1d8"/>
      <stop offset="0.45" stop-color="#ff4747"/>
      <stop offset="1" stop-color="#730000"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 0 0 0 0.05  0 0 0 0 0.03  0 0 0 .72 0" result="redBlur"/>
      <feMerge><feMergeNode in="redBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <circle cx="256" cy="262" r="187" fill="none" stroke="#ff3333" stroke-width="3" opacity="0.20"/>
  <circle cx="256" cy="262" r="166" fill="none" stroke="#ff3333" stroke-width="1.5" opacity="0.18"/>

  <g filter="url(#glow)">
    <!-- Spartan crest -->
    <path d="M252 67
             C225 78 203 99 194 130
             C218 119 239 115 258 116
             C280 117 303 124 324 138
             C315 104 290 78 252 67Z"
          fill="url(#red)"/>
    <path d="M252 67 C215 120 208 182 215 242" fill="none" stroke="#ff6a60" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
    <path d="M252 67 C291 121 300 183 293 245" fill="none" stroke="#ba0909" stroke-width="10" stroke-linecap="round" opacity="0.75"/>

    <!-- Helmet shell -->
    <path d="M170 211
             C170 141 215 104 270 111
             C326 119 369 163 368 226
             C367 288 331 327 282 337
             L282 392
             C282 407 270 419 255 419
             C240 419 228 407 228 392
             L228 328
             C193 309 171 269 170 211Z"
          fill="url(#metal)"/>

    <!-- Face opening -->
    <path d="M231 196
             C256 176 300 181 331 205
             C314 223 289 233 259 233
             L259 313
             C242 309 229 296 223 278
             L223 220
             C223 210 226 202 231 196Z"
          fill="#080808" opacity="0.98"/>

    <!-- Nose guard -->
    <path d="M254 229 L286 229 L278 392 C277 410 263 425 246 425 L232 425 L246 304 Z"
          fill="#0a0a0a" opacity="0.94"/>

    <!-- Cheek guard -->
    <path d="M179 239
             C190 279 215 310 248 321
             L239 388
             C207 374 182 346 168 310
             C158 283 158 258 179 239Z"
          fill="#b90909" opacity="0.98"/>

    <!-- Rear guard -->
    <path d="M338 224
             C376 249 382 302 354 348
             C337 376 315 394 287 406
             L287 335
             C323 326 349 291 349 249
             C349 240 345 231 338 224Z"
          fill="#700000" opacity="0.96"/>

    <!-- Brow / rim -->
    <path d="M186 205 C220 164 295 159 348 211" fill="none" stroke="#ffd0c8" stroke-width="13" stroke-linecap="round" opacity="0.72"/>
    <path d="M186 205 C220 164 295 159 348 211" fill="none" stroke="#ff2020" stroke-width="7" stroke-linecap="round"/>

    <!-- Neck edge -->
    <path d="M169 316 C191 366 229 396 279 407" fill="none" stroke="#ff3a35" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
