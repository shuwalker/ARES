name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ARES-Desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run tests
        run: ./scripts/run-tests.sh

      - name: Build app bundle
        run: ./scripts/build-macos-app.sh

      - name: Package release artifact
        run: ./scripts/package-github-release.sh

      - name: Verify packaged release
        run: ./scripts/verify-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            ARES-Desktop/dist/ARES.app.zip
            ARES-Desktop/dist/ARES.app.zip.sha256
            ARES-Desktop/dist/ARES.app.zip.manifest.json
