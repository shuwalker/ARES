# ARES Governance Policy: Firmware Flashing
# Risk profile: CRITICAL — irreversible hardware state change, brick risk
# This policy governs all firmware flashing operations on the ARES robotics
# platform. Firmware updates are gated: they require explicit human approval,
# and certain conditions must be met (backup verification, checksum validation).

version: "1.0"
name: ares-firmware
description: >
  Gated firmware flashing governance for the ARES robotics platform.
  All firmware write operations are deny-by-default. Flashing requires
  human approval, backup verification, and integrity checks. Read-only
  firmware version queries and checksum verification are permitted.

rules:
  # --- BLOCK: All firmware write/flash operations ---
  - name: block-firmware-flash
    condition: {field: action, operator: eq, value: firmware_flash}
    action: deny
    priority: 100
    message: "Firmware flashing blocked: requires explicit human approval and gated workflow"

  - name: block-firmware-update
    condition: {field: action, operator: eq, value: firmware_update}
    action: deny
    priority: 100
    message: "Firmware update blocked: requires explicit human approval and gated workflow"

  - name: block-firmware-erase
    condition: {field: action, operator: eq, value: firmware_erase}
    action: deny
    priority: 100
    message: "Firmware erase blocked: requires explicit human approval"

  - name: block-bootloader-write
    condition: {field: action, operator: eq, value: bootloader_write}
    action: deny
    priority: 100
    message: "Bootloader write blocked: requires explicit human approval"

  - name: block-mcu-program
    condition: {field: action, operator: eq, value: mcu_program}
    action: deny
    priority: 100
    message: "MCU programming blocked: requires explicit human approval and gated workflow"

  - name: block-fpga-program
    condition: {field: action, operator: eq, value: fpga_program}
    action: deny
    priority: 100
    message: "FPGA programming blocked: requires explicit human approval and gated workflow"

  - name: block-eeprom-write
    condition: {field: action, operator: eq, value: eeprom_write}
    action: deny
    priority: 100
    message: "EEPROM write blocked: requires explicit human approval"

  # --- BLOCK: Firmware flash tool invocations ---
  - name: block-flash-tool-invoke
    condition: {field: action, operator: matches, value: "^(avrdude|openocd|jlink|stlink|esptool|dfu-util|teensy_loader|platformio.*upload)"}
    action: deny
    priority: 100
    message: "Flash tool invocation blocked: all firmware flashing requires gated workflow"

  # --- ESCALATE: Firmware operations requiring human gate ---
  - name: escalate-firmware-flash
    condition: {field: action, operator: eq, value: firmware_flash}
    action: escalate
    priority: 95
    message: "Firmware flash requires: (1) human approval, (2) verified backup, (3) checksum validation"

  - name: escalate-firmware-update
    condition: {field: action, operator: eq, value: firmware_update}
    action: escalate
    priority: 95
    message: "Firmware update requires: (1) human approval, (2) verified backup, (3) release notes review"

  - name: escalate-mcu-program
    condition: {field: action, operator: eq, value: mcu_program}
    action: escalate
    priority: 95
    message: "MCU programming requires: (1) human approval, (2) binary artifact verification, (3) backup of current firmware"

  # --- ALLOW: Read-only firmware queries ---
  - name: allow-firmware-version
    condition: {field: action, operator: eq, value: firmware_version}
    action: allow
    priority: 50
    message: "Firmware version read permitted"

  - name: allow-firmware-checksum
    condition: {field: action, operator: eq, value: firmware_checksum}
    action: allow
    priority: 50
    message: "Firmware checksum verification permitted"

  - name: allow-firmware-verify
    condition: {field: action, operator: eq, value: firmware_verify}
    action: allow
    priority: 50
    message: "Firmware verification read permitted"

  - name: allow-firmware-dump
    condition: {field: action, operator: eq, value: firmware_dump}
    action: allow
    priority: 50
    message: "Firmware backup dump permitted (read-only)"

  - name: allow-mcu-identify
    condition: {field: action, operator: eq, value: mcu_identify}
    action: allow
    priority: 50
    message: "MCU identification read permitted"

  - name: allow-bootloader-version
    condition: {field: action, operator: eq, value: bootloader_version}
    action: allow
    priority: 50
    message: "Bootloader version read permitted"

  # --- BLOCK: Any generic firmware pattern ---
  - name: block-firmware-pattern
    condition: {field: action, operator: matches, value: "^(firmware_|bootloader_|eeprom_|mcu_|fpga_|flash_)"}
    action: deny
    priority: 90
    message: "Firmware operation blocked: all firmware write/erase/program operations require gated workflow"

  # --- Gate conditions (documented, enforced by runtime) ---
  # These are informational; the runtime must enforce gating.
  # 1. Backup: current firmware must be dumped and checksum-verified before flashing
  # 2. Integrity: new firmware binary must pass SHA-256 checksum verification
  # 3. Approval: human must explicitly approve the flash operation
  # 4. Rollback: a verified rollback plan must exist (previous firmware available)
  # 5. Logging: full audit trail of flash operation (versions, checksums, timestamps, approver)

defaults:
  action: deny
  max_tool_calls: 15
