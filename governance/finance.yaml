# ARES Governance Policy: Financial Transactions
# Risk profile: HIGH — monetary loss, fraud, regulatory compliance
# This policy governs all financial actions on the ARES robotics platform.
# NO autonomous financial decisions are permitted. All financial operations
# require explicit human approval. Read-only balance/cost queries are allowed.

version: "1.0"
name: ares-finance
description: >
  Financial transaction governance for the ARES robotics platform.
  Zero autonomous financial decisions permitted. All payment, transfer,
  purchase, subscription, and billing actions require explicit human
  approval. Read-only queries (balance, cost estimation, invoice lookup)
  are permitted for informational purposes.

rules:
  # --- BLOCK: All financial transaction actions ---
  - name: block-payment-send
    condition: {field: action, operator: eq, value: payment_send}
    action: deny
    priority: 100
    message: "Payment blocked: no autonomous financial transactions permitted"

  - name: block-payment-authorize
    condition: {field: action, operator: eq, value: payment_authorize}
    action: deny
    priority: 100
    message: "Payment authorization blocked: no autonomous financial transactions permitted"

  - name: block-transfer-funds
    condition: {field: action, operator: eq, value: transfer_funds}
    action: deny
    priority: 100
    message: "Funds transfer blocked: no autonomous financial transactions permitted"

  - name: block-purchase
    condition: {field: action, operator: eq, value: purchase}
    action: deny
    priority: 100
    message: "Purchase blocked: no autonomous purchasing permitted"

  - name: block-subscription-create
    condition: {field: action, operator: eq, value: subscription_create}
    action: deny
    priority: 100
    message: "Subscription creation blocked: no autonomous financial commitments permitted"

  - name: block-subscription-cancel
    condition: {field: action, operator: eq, value: subscription_cancel}
    action: deny
    priority: 100
    message: "Subscription cancellation blocked: requires human approval"

  - name: block-billing-update
    condition: {field: action, operator: eq, value: billing_update}
    action: deny
    priority: 100
    message: "Billing update blocked: requires human approval"

  - name: block-invoice-pay
    condition: {field: action, operator: eq, value: invoice_pay}
    action: deny
    priority: 100
    message: "Invoice payment blocked: no autonomous financial transactions permitted"

  - name: block-refund-issue
    condition: {field: action, operator: eq, value: refund_issue}
    action: deny
    priority: 100
    message: "Refund issuance blocked: requires human approval"

  - name: block-credit-card-charge
    condition: {field: action, operator: eq, value: credit_card_charge}
    action: deny
    priority: 100
    message: "Credit card charge blocked: no autonomous financial transactions permitted"

  - name: block-crypto-send
    condition: {field: action, operator: eq, value: crypto_send}
    action: deny
    priority: 100
    message: "Cryptocurrency send blocked: no autonomous financial transactions permitted"

  - name: block-crypto-trade
    condition: {field: action, operator: eq, value: crypto_trade}
    action: deny
    priority: 100
    message: "Cryptocurrency trade blocked: no autonomous financial transactions permitted"

  - name: block-api-key-purchase
    condition: {field: action, operator: eq, value: api_key_purchase}
    action: deny
    priority: 100
    message: "API key / service purchase blocked: requires human approval"

  - name: block-donate
    condition: {field: action, operator: eq, value: donate}
    action: deny
    priority: 100
    message: "Donation blocked: no autonomous financial transactions permitted"

  # --- ESCALATE: Financial operations requiring human approval ---
  - name: escalate-payment
    condition: {field: action, operator: matches, value: "^(payment_|transfer_|purchase|subscription_|billing_|invoice_|refund_)"}
    action: escalate
    priority: 95
    message: "Financial transaction requires explicit human approval: review amount, recipient, and purpose"

  - name: escalate-crypto
    condition: {field: action, operator: matches, value: "^(crypto_|wallet_)"}
    action: escalate
    priority: 95
    message: "Cryptocurrency operation requires explicit human approval"

  # --- ALLOW: Read-only financial queries ---
  - name: allow-balance-check
    condition: {field: action, operator: eq, value: balance_check}
    action: allow
    priority: 50
    message: "Balance check permitted (read-only)"

  - name: allow-cost-estimate
    condition: {field: action, operator: eq, value: cost_estimate}
    action: allow
    priority: 50
    message: "Cost estimation permitted (read-only)"

  - name: allow-invoice-lookup
    condition: {field: action, operator: eq, value: invoice_lookup}
    action: allow
    priority: 50
    message: "Invoice lookup permitted (read-only)"

  - name: allow-transaction-history
    condition: {field: action, operator: eq, value: transaction_history}
    action: allow
    priority: 50
    message: "Transaction history read permitted"

  - name: allow-subscription-status
    condition: {field: action, operator: eq, value: subscription_status}
    action: allow
    priority: 50
    message: "Subscription status read permitted"

  - name: allow-price-compare
    condition: {field: action, operator: eq, value: price_compare}
    action: allow
    priority: 50
    message: "Price comparison permitted (read-only)"

  # --- BLOCK: Any financial pattern match ---
  - name: block-financial-pattern
    condition: {field: action, operator: matches, value: "^(pay|transfer|purchase|buy|charge|bill|invoice|refund|subscribe|donate|tip|withdraw|deposit)"}
    action: deny
    priority: 90
    message: "Financial action blocked: all financial transactions require explicit human approval"

  # --- BLOCK: Sensitive financial data in output ---
  - name: block-credit-card-output
    condition: {field: output, operator: matches, value: "\\b(?:\\d[ -]*?){13,16}\\b"}
    action: deny
    priority: 100
    message: "Credit card number detected in output — blocked"

  - name: block-bank-account-output
    condition: {field: output, operator: matches, value: "\\b\\d{8,12}\\b"}
    action: deny
    priority: 95
    message: "Potential bank account number detected in output — blocked"

  # --- SPENDING CAP: Hard limit enforcement (runtime must enforce) ---
  # Any single transaction > $0.00 requires human approval (already covered above).
  # No cumulative spending is permitted autonomously.
  # The maximum spend without human approval is $0.00.

defaults:
  action: deny
  max_tool_calls: 20
