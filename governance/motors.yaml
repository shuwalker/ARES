# ARES Governance Policy: Motor & Servo Control
# Risk profile: CRITICAL — physical safety, hardware damage, human injury
# This policy governs all motor and servo commands on the ARES robotics platform.
# All motor commands require explicit human approval. No autonomous motion.

version: "1.0"
name: ares-motors
description: >
  Motor and servo control governance for the ARES robotics platform (JP01).
  All physical actuation commands are deny-by-default and require human
  approval before execution. Read-only sensor queries are permitted.

rules:
  # --- BLOCK: All motor/servo write commands ---
  - name: block-motor-move
    condition: {field: action, operator: eq, value: motor_move}
    action: deny
    priority: 100
    message: "Motor movement blocked: requires explicit human approval"

  - name: block-motor-set-position
    condition: {field: action, operator: eq, value: motor_set_position}
    action: deny
    priority: 100
    message: "Motor position set blocked: requires explicit human approval"

  - name: block-motor-set-velocity
    condition: {field: action, operator: eq, value: motor_set_velocity}
    action: deny
    priority: 100
    message: "Motor velocity set blocked: requires explicit human approval"

  - name: block-motor-set-torque
    condition: {field: action, operator: eq, value: motor_set_torque}
    action: deny
    priority: 100
    message: "Motor torque set blocked: requires explicit human approval"

  - name: block-servo-move
    condition: {field: action, operator: eq, value: servo_move}
    action: deny
    priority: 100
    message: "Servo movement blocked: requires explicit human approval"

  - name: block-servo-set-angle
    condition: {field: action, operator: eq, value: servo_set_angle}
    action: deny
    priority: 100
    message: "Servo angle set blocked: requires explicit human approval"

  - name: block-motor-enable
    condition: {field: action, operator: eq, value: motor_enable}
    action: deny
    priority: 100
    message: "Motor enable blocked: requires explicit human approval"

  - name: block-motor-calibrate
    condition: {field: action, operator: eq, value: motor_calibrate}
    action: deny
    priority: 100
    message: "Motor calibration blocked: requires explicit human approval"

  - name: block-motor-home
    condition: {field: action, operator: eq, value: motor_home}
    action: deny
    priority: 100
    message: "Motor homing blocked: requires explicit human approval"

  - name: block-gripper-actuate
    condition: {field: action, operator: eq, value: gripper_actuate}
    action: deny
    priority: 100
    message: "Gripper actuation blocked: requires explicit human approval"

  # --- ESCALATE: Motor write commands needing human review ---
  # These are duplicates of the blocks above but at the escalation level.
  # The operator can lift these on a case-by-case basis via the approval UI.
  - name: escalate-motor-move
    condition: {field: action, operator: eq, value: motor_move}
    action: escalate
    priority: 95
    message: "Motor movement requires human review and approval"

  - name: escalate-servo-move
    condition: {field: action, operator: eq, value: servo_move}
    action: escalate
    priority: 95
    message: "Servo movement requires human review and approval"

  - name: escalate-gripper-actuate
    condition: {field: action, operator: eq, value: gripper_actuate}
    action: escalate
    priority: 95
    message: "Gripper actuation requires human review and approval"

  # --- ALLOW: Read-only motor/servo queries ---
  - name: allow-motor-get-position
    condition: {field: action, operator: eq, value: motor_get_position}
    action: allow
    priority: 50
    message: "Motor position read permitted"

  - name: allow-motor-get-velocity
    condition: {field: action, operator: eq, value: motor_get_velocity}
    action: allow
    priority: 50
    message: "Motor velocity read permitted"

  - name: allow-motor-get-status
    condition: {field: action, operator: eq, value: motor_get_status}
    action: allow
    priority: 50
    message: "Motor status read permitted"

  - name: allow-servo-get-angle
    condition: {field: action, operator: eq, value: servo_get_angle}
    action: allow
    priority: 50
    message: "Servo angle read permitted"

  - name: allow-encoder-read
    condition: {field: action, operator: eq, value: encoder_read}
    action: allow
    priority: 50
    message: "Encoder read permitted"

  # --- BLOCK: Any generic action matching motor/servo patterns ---
  - name: block-motor-pattern
    condition: {field: action, operator: matches, value: "^(motor_|servo_|gripper_|actuator_|joint_)"}
    action: deny
    priority: 90
    message: "Physical actuation command blocked: all motor/servo/gripper/actuator commands require human approval"

  # --- BLOCK: Emergency stop is always allowed ---
  - name: allow-emergency-stop
    condition: {field: action, operator: eq, value: emergency_stop}
    action: allow
    priority: 200
    message: "Emergency stop always permitted"

defaults:
  action: deny
  max_tool_calls: 20
