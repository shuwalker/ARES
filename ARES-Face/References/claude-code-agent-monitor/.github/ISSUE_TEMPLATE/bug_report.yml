name: Bug Report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the sections below as completely as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app is affected?
      options:
        - Server / API
        - Client / UI
        - WebSocket / Real-time
        - Hook Integration
        - Sessions / Agents
        - Analytics / Tokens
        - Settings / Pricing
        - Database / SQLite
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"

  - type: input
    id: browser
    attributes:
      label: Browser (if frontend issue)
      placeholder: "e.g. Chrome 122, Safari 17"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any console errors, stack traces, or API response bodies.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, network traces, anything else that might help.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am running the latest version of the app.
          required: true
