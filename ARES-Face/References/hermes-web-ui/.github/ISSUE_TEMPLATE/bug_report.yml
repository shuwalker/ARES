name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: Hermes Web UI Version
      description: What version of Hermes Web UI are you using?
      placeholder: e.g., v0.5.8
    validations:
      required: true

  - type: input
    id: hermes_version
    attributes:
      label: Hermes Agent Version
      description: What version of Hermes Agent are you using?
      placeholder: e.g., v0.12.0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: |
        If applicable, add screenshots to help explain your problem
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Paste any relevant logs or error messages
      render: shell

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where are you running Hermes Web UI?
      options:
        - Docker
        - macOS
        - Linux
        - Windows
        - WSL
      multiple: true
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node Version
      description: What version of Node.js are you using?
      placeholder: e.g., v24.14.1

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem
