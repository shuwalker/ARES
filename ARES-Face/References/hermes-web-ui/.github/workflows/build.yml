name: Build

on:
  pull_request:
    branches:
      - main
      - base

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install dependencies
        run: npm install

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build
